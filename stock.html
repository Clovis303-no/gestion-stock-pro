<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>GestionStock Pro - Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css3/style3.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="theme-toggle" onclick="toggleTheme()" title="Changer le thème">
                <i class="fas fa-moon"></i>
            </button>
            <h1><i class="fas fa-boxes"></i> Gestion du Stock</h1>
            <p>Gérez vos produits</p>
        </header>

        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Accueil</span>
            </a>
            <a href="stock.html" class="nav-item active">
                <i class="fas fa-boxes"></i>
                <span>Stock</span>
            </a>
            <a href="ventes.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Ventes</span>
            </a>
            <a href="clients.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Clients</span>
            </a>
            <a href="depenses.html" class="nav-item">
                <i class="fas fa-money-bill-wave"></i>
                <span>Dépenses</span>
            </a>
            <a href="benefices.html" class="nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Bénéfices</span>
            </a>
            <a href="rapports.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Rapports</span>
            </a>
        </nav>

        <main class="main-content">
            <!-- Résumé du stock -->
            <div class="stats-grid" id="stockStats">
                <!-- Rempli dynamiquement -->
            </div>

            <!-- Barre de recherche et ajout -->
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchProduct" placeholder="Rechercher un produit..." onkeyup="filterProducts()">
            </div>

            <button class="btn btn-primary" onclick="showAddProductModal()" style="margin-bottom: 20px;">
                <i class="fas fa-plus"></i> Ajouter un produit
            </button>

            <!-- Liste des produits -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-list"></i>
                    Liste des produits
                </div>
                <div class="table-container">
                    <table id="productsTable">
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Catégorie</th>
                                <th>Prix vente</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsList">
                            <!-- Rempli dynamiquement -->
                        </tbody>
                    </table>
                </div>
                <div id="noProducts" class="empty-state" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <p>Aucun produit en stock</p>
                    <p style="font-size: 0.8rem;">Cliquez sur "Ajouter un produit" pour commencer</p>
                </div>
            </div>
        </main>

        <!-- Modal Ajout/Modification produit -->
        <div class="modal" id="productModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Ajouter un produit</h3>
                    <button class="modal-close" onclick="closeProductModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="productForm" onsubmit="saveProduct(event)">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label for="productName">Nom du produit *</label>
                        <input type="text" class="form-control" id="productName" required placeholder="Ex: Riz, Savon, Huile...">
                    </div>

                    <div class="form-group">
                        <label for="productCategory">Catégorie</label>
                        <select class="form-control" id="productCategory">
                            <option value="Alimentation">Alimentation</option>
                            <option value="Boissons">Boissons</option>
                            <option value="Électronique">Électronique</option>
                            <option value="Vêtements">Vêtements</option>
                            <option value="Cosmétiques">Cosmétiques</option>
                            <option value="Fournitures">Fournitures</option>
                            <option value="Autres">Autres</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="purchasePrice">Prix d'achat (€) *</label>
                        <input type="number" class="form-control" id="purchasePrice" required step="0.01" min="0" placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label for="sellingPrice">Prix de vente (€) *</label>
                        <input type="number" class="form-control" id="sellingPrice" required step="0.01" min="0" placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label for="productQuantity">Quantité en stock *</label>
                        <input type="number" class="form-control" id="productQuantity" required min="0" placeholder="0">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Enregistrer
                    </button>
                </form>
            </div>
        </div>

        <!-- Navigation mobile -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-nav-item">
                <i class="fas fa-home"></i>
                <span>Accueil</span>
            </a>
            <a href="stock.html" class="bottom-nav-item active">
                <i class="fas fa-boxes"></i>
                <span>Stock</span>
            </a>
            <a href="ventes.html" class="bottom-nav-item">
                <i class="fas fa-plus-circle"></i>
                <span>Vente</span>
            </a>
            <a href="clients.html" class="bottom-nav-item">
                <i class="fas fa-users"></i>
                <span>Clients</span>
            </a>
            <a href="rapports.html" class="bottom-nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Rapports</span>
            </a>
        </nav>
    </div>

    <script src="data/localStorage.js"></script>
    <script src="js3/stock3.js"></script>
</body>
</html>
